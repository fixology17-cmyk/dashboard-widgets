<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f9fb; --card: #ffffff; --text: #1b1f27; --text2: #5f6980; --text3: #9aa3b4;
    --border: #e8ecf2; --accent: #4285f4; --accent-light: #e8f0fe; --green: #34a853;
    --green-light: #e6f4ea; --red: #ea4335; --red-light: #fce8e6; --amber: #fbbc04;
    --amber-light: #fef7e0; --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 24px; -webkit-font-smoothing: antialiased; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .header-left h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
  .header-left p { font-size: 13px; color: var(--text3); margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px; white-space: nowrap; }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-gray { background: var(--card); border: 1px solid var(--border); color: var(--text3); font-weight: 500; font-size: 11px; }
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s; }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .kpi-card .kpi-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 12px; }
  .kpi-card .kpi-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card .kpi-value { font-size: 28px; font-weight: 800; margin-top: 4px; line-height: 1; }
  .kpi-card .kpi-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .kpi-card.main { background: var(--accent); border-color: var(--accent); }
  .kpi-card.main .kpi-label, .kpi-card.main .kpi-value, .kpi-card.main .kpi-sub { color: #fff; }
  .kpi-card.main .kpi-icon { background: rgba(255,255,255,0.2); color: #fff; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .h-bar { margin-bottom: 12px; }
  .h-bar:last-child { margin-bottom: 0; }
  .h-bar-top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .h-bar-label { font-weight: 600; color: var(--text); }
  .h-bar-val { font-weight: 700; color: var(--text2); }
  .h-bar-track { background: #f0f2f5; border-radius: 6px; height: 20px; overflow: hidden; }
  .h-bar-fill { height: 100%; border-radius: 6px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); width: 0; }
  .chart-container { width: 100%; height: 160px; }
  .chart-container svg { width: 100%; height: 100%; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
  .table-title { padding: 16px 16px 12px; font-size: 14px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f9fafb; border-bottom: 1px solid var(--border); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  tbody tr { border-bottom: 1px solid #f3f4f6; }
  tbody tr:hover { background: #f8f9ff; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-active { background: var(--green); }
  .status-paused { background: var(--amber); }
  .status-removed { background: var(--red); }
  .loading-screen { display: flex; flex-direction: column; align-items: center; padding: 80px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text3); }
  .error-screen { text-align: center; padding: 60px; color: var(--red); }
  @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } .two-col { grid-template-columns: 1fr; } body { padding: 16px; } }
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading Google Ads data...</div>
  </div>
</div>
<script>
const SHEET_ID = '1ep4N3SgDm8hhdiV9BALOPGxjUemCeLf5Ct8i-Hvem8g';
const ACCOUNT_NAME = 'QualityPRO LSA';

async function fetchSheet(sheetName) {
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheetName);
  const resp = await fetch(url);
  const text = await resp.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
  const cols = json.table.cols.map(function(c) { return c.label; });
  return json.table.rows.map(function(r) {
    var obj = {};
    r.c.forEach(function(cell, i) {
      obj[cols[i]] = cell ? (cell.v !== null && cell.v !== undefined ? cell.v : (cell.f || '')) : '';
    });
    return obj;
  });
}

function fmtMoney(v) {
  var n = typeof v === 'string' ? parseFloat(v) : (v || 0);
  return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function sparklineSVG(data, key, w, h, color) {
  if (!data.length) return '';
  var vals = data.map(function(d) { return parseFloat(d[key]) || 0; });
  var max = Math.max.apply(null, vals.concat([1]));
  var barW = Math.max(2, (w - data.length * 2) / data.length);
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    vals.map(function(v, i) {
      var bh = (v / max) * (h - 10);
      var dl = data[i].Date || '';
      return '<rect x="' + (i * (barW + 2)) + '" y="' + (h - bh) + '" width="' + barW + '" height="' + bh + '" rx="2" fill="' + color + '" opacity="0.7"><title>' + dl + ': ' + (key === 'Cost' ? fmtMoney(v) : v) + '</title></rect>';
    }).join('') + '</svg>';
}

function statusClass(s) {
  s = (s || '').toLowerCase();
  if (s === 'enabled') return 'status-active';
  if (s === 'paused') return 'status-paused';
  return 'status-removed';
}

function statusLabel(s) {
  s = (s || '').toLowerCase();
  if (s === 'enabled') return 'Active';
  if (s === 'paused') return 'Paused';
  if (s === 'removed') return 'Removed';
  return s;
}

async function init() {
  var app = document.getElementById('app');
  try {
    var results = await Promise.all([
      fetchSheet('campaigns'),
      fetchSheet('daily'),
      fetchSheet('keywords'),
      fetchSheet('meta')
    ]);
    var campaigns = results[0];
    var daily = results[1];
    var keywords = results[2];
    var meta = results[3];

    var totalClicks = 0, totalImpr = 0, totalCost = 0, totalConv = 0;
    campaigns.forEach(function(c) {
      totalClicks += parseInt(c.Clicks) || 0;
      totalImpr += parseInt(c.Impressions) || 0;
      totalCost += parseFloat(c.Cost) || 0;
      totalConv += parseFloat(c.Conversions) || 0;
    });
    var avgCpc = totalClicks > 0 ? totalCost / totalClicks : 0;
    var ctr = totalImpr > 0 ? (totalClicks / totalImpr * 100).toFixed(2) : '0.00';
    var costPerConv = totalConv > 0 ? totalCost / totalConv : 0;

    var lastUpdated = meta.length > 0 ? (meta[0]['Last Updated'] || '') : '';
    var updatedStr = lastUpdated ? new Date(lastUpdated).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'auto-refresh daily';

    var maxKwCost = keywords.length > 0 ? Math.max.apply(null, keywords.map(function(k) { return parseFloat(k.Cost) || 0; }).concat([1])) : 1;

    var html = '';
    html += '<div class="header"><div class="header-left"><h1>Google Ads \u2014 LSA</h1>';
    html += '<p>' + ACCOUNT_NAME + ' \u00b7 Last 30 Days</p></div>';
    html += '<div class="header-right"><span class="badge badge-blue">ID: 227-783-1466</span>';
    html += '<span class="badge badge-gray">Updated ' + updatedStr + '</span></div></div>';

    html += '<div class="kpi-row">';
    html += '<div class="kpi-card main"><div class="kpi-icon" style="background:rgba(255,255,255,0.2);color:#fff;">\uD83D\uDCB0</div>';
    html += '<div class="kpi-label">Total Spend</div><div class="kpi-value">' + fmtMoney(totalCost) + '</div>';
    html += '<div class="kpi-sub">Last 30 Days</div></div>';

    html += '<div class="kpi-card"><div class="kpi-icon" style="background:var(--accent-light);color:var(--accent);">\uD83D\uDC46</div>';
    html += '<div class="kpi-label">Clicks</div><div class="kpi-value">' + totalClicks.toLocaleString() + '</div>';
    html += '<div class="kpi-sub">CTR: ' + ctr + '%</div></div>';

    html += '<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-light);color:var(--green);">\uD83D\uDC41</div>';
    html += '<div class="kpi-label">Impressions</div><div class="kpi-value">' + totalImpr.toLocaleString() + '</div>';
    html += '<div class="kpi-sub">Last 30 Days</div></div>';

    html += '<div class="kpi-card"><div class="kpi-icon" style="background:var(--amber-light);color:var(--amber);">\uD83D\uDCCA</div>';
    html += '<div class="kpi-label">Avg CPC</div><div class="kpi-value">' + fmtMoney(avgCpc) + '</div>';
    html += '<div class="kpi-sub">cost per click</div></div>';

    html += '<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-light);color:var(--green);">\uD83C\uDFAF</div>';
    html += '<div class="kpi-label">Conversions</div><div class="kpi-value">' + totalConv.toLocaleString() + '</div>';
    html += '<div class="kpi-sub">' + (totalConv > 0 ? fmtMoney(costPerConv) + ' / conv' : 'tracking') + '</div></div>';
    html += '</div>';

    html += '<div class="two-col"><div class="panel"><h3>Daily Clicks</h3><div class="chart-container">';
    html += sparklineSVG(daily, 'Clicks', 500, 160, '#4285f4') + '</div></div>';
    html += '<div class="panel"><h3>Daily Spend</h3><div class="chart-container">';
    html += sparklineSVG(daily, 'Cost', 500, 160, '#34a853') + '</div></div></div>';

    html += '<div class="two-col"><div class="panel"><h3>Daily Conversions</h3><div class="chart-container">';
    html += sparklineSVG(daily, 'Conversions', 500, 160, '#fbbc04') + '</div></div>';
    html += '<div class="panel"><h3>Daily Impressions</h3><div class="chart-container">';
    html += sparklineSVG(daily, 'Impressions', 500, 160, '#ea4335') + '</div></div></div>';

    html += '<div class="table-wrap"><div class="table-title">Campaigns</div><table><thead><tr>';
    html += '<th>Campaign</th><th>Status</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Avg CPC</th><th>Cost</th><th>Conv.</th>';
    html += '</tr></thead><tbody>';
    campaigns.forEach(function(c) {
      html += '<tr><td style="font-weight:600;">' + (c.Campaign || '\u2014') + '</td>';
      html += '<td><span class="status-dot ' + statusClass(c.Status) + '"></span>' + statusLabel(c.Status) + '</td>';
      html += '<td>' + (parseInt(c.Clicks || 0)).toLocaleString() + '</td>';
      html += '<td>' + (parseInt(c.Impressions || 0)).toLocaleString() + '</td>';
      html += '<td>' + (c.CTR || '0%') + '</td>';
      html += '<td>' + fmtMoney(c.AvgCPC) + '</td>';
      html += '<td style="font-weight:700;">' + fmtMoney(c.Cost) + '</td>';
      html += '<td>' + (parseFloat(c.Conversions || 0)).toLocaleString() + '</td></tr>';
    });
    html += '</tbody></table></div>';

    if (keywords.length > 0) {
      html += '<div class="table-wrap"><div class="table-title">Top Keywords</div><div style="padding:0 16px 16px;">';
      keywords.forEach(function(k) {
        var kwCost = parseFloat(k.Cost) || 0;
        html += '<div class="h-bar"><div class="h-bar-top">';
        html += '<span class="h-bar-label">' + (k.Keyword || '\u2014') + '</span>';
        html += '<span class="h-bar-val">' + fmtMoney(kwCost) + ' \u00b7 ' + (parseInt(k.Clicks || 0)) + ' clicks \u00b7 ' + (k.CTR || '0%') + '</span>';
        html += '</div><div class="h-bar-track">';
        html += '<div class="h-bar-fill" data-width="' + Math.round(kwCost / maxKwCost * 100) + '" style="background:var(--accent);"></div>';
        html += '</div></div>';
      });
      html += '</div></div>';
    }

    app.innerHTML = html;

    setTimeout(function() {
      document.querySelectorAll('.h-bar-fill').forEach(function(bar) {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 50);

  } catch(e) {
    app.innerHTML = '<div class="error-screen">Failed to load data.<br><small>' + e.message + '</small></div>';
    console.error(e);
  }
}

init();
</script>
</body>
</html>
